<touchégg>

  <settings>
    <property name="animation_delay">150</property>
    <property name="action_execute_threshold">20</property>
    <property name="color">auto</property>
    <property name="borderColor">auto</property>
  </settings>

  <application name="All">
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="RUN_COMMAND">
        <repeat>false</repeat>
        <command>~/.config/touchegg/gestures-tty-run.sh next</command>
        <on>begin</on>
      </action>
    </gesture>

    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="RUN_COMMAND">
        <repeat>false</repeat>
        <command>~/.config/touchegg/gestures-tty-run.sh prev</command>
        <on>begin</on>
      </action>
    </gesture>

    <gesture type="PINCH" fingers="4" direction="IN">
      <action type="RUN_COMMAND">
        <repeat>false</repeat>
        <command>~/.config/touchegg/gestures-tty-run.sh kill</command>
        <on>begin</on>
      </action>
    </gesture>

  </application>

</touchégg>
